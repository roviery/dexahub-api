version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dexahub_db
      MYSQL_USER: dexahub
      MYSQL_PASSWORD: dexahub_pass
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: dexahub
      DB_PASS: dexahub_pass
      DB_NAME: dexahub_db
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    depends_on:
      mysql:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: apps/user-service/Dockerfile
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: dexahub
      DB_PASS: dexahub_pass
      DB_NAME: dexahub_db
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    depends_on:
      mysql:
        condition: service_healthy

  attendance-service:
    build:
      context: .
      dockerfile: apps/attendance-service/Dockerfile
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: dexahub
      DB_PASS: dexahub_pass
      DB_NAME: dexahub_db
    depends_on:
      mysql:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    ports:
      - '3000:3000'
    environment:
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      AUTH_SERVICE_HOST: auth-service
      USER_SERVICE_HOST: user-service
      ATTENDANCE_SERVICE_HOST: attendance-service
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - auth-service
      - user-service
      - attendance-service

volumes:
  mysql_data:
  uploads_data:
